<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART RESTO | PREMIUM MENU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;900&display=swap');
        body { background: #080808; color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .gold-text { background: linear-gradient(90deg, #d4af37, #fcf6ba, #b8860b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(15px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-btn { background: #d4af37 !important; color: #000 !important; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { border-color: #d4af37; transform: translateY(-5px); }
        img { border-radius: 1.5rem; object-fit: cover; width: 100%; height: 100%; transition: 0.5s; }
        .product-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body class="pb-20">

    <header class="p-6 glass sticky top-0 z-50 flex justify-between items-center border-b border-white/5">
        <h1 class="text-2xl font-black gold-text uppercase">Premium Resto</h1>
        <div id="clock" class="text-[10px] text-zinc-500 font-bold tracking-widest">00:00:00</div>
    </header>

    <div class="max-w-7xl mx-auto p-4 lg:p-10 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-8">
            <div id="category-bar" class="flex gap-3 overflow-x-auto pb-6 no-scrollbar sticky top-24 bg-[#080808]/95 z-40 py-2">
                </div>
            
            <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">
                </div>
        </div>

        <div class="lg:col-span-4">
            <div class="glass p-8 rounded-[2.5rem] sticky top-32 border-t-4 border-yellow-600 shadow-2xl">
                <h2 class="text-xs font-black uppercase tracking-widest mb-6 gold-text italic">Sizning Savatingiz</h2>
                <div id="cart-list" class="space-y-4 mb-8 max-h-[400px] overflow-y-auto no-scrollbar text-zinc-400">
                    <p class="text-center py-10 uppercase text-[10px]">Savat bo'sh</p>
                </div>
                <div class="flex justify-between items-center py-6 border-t border-white/10">
                    <span class="text-xs font-bold text-zinc-500 uppercase">Jami:</span>
                    <span id="total-price" class="text-2xl font-black gold-text">0 UZS</span>
                </div>
                <input type="text" id="custName" placeholder="ISMINGIZ" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-xs outline-none focus:border-yellow-500 mb-3 text-white">
                <button onclick="sendOrder()" class="w-full py-5 bg-yellow-600 text-black font-black rounded-2xl text-[10px] hover:bg-yellow-500 transition-all uppercase tracking-widest">Buyurtma Berish</button>
            </div>
        </div>
    </div>

    <script>
        // Har xil rasmlarni chiqarish uchun maxsus kalit so'zlar
        const PHOTO_TAGS = {
            "LAVASHLAR": "shawarma",
            "BURGERLAR": "burger",
            "PIZZALAR": "pizza",
            "KOMBOLAR": "meal",
            "ICHIMLIKLAR": "drink",
            "GARNIRLAR": "fries"
        };

        const MENU_DATA = {};
        const categories = ["LAVASHLAR", "BURGERLAR", "PIZZALAR", "KOMBOLAR", "ICHIMLIKLAR", "GARNIRLAR"];

        // Har bir kategoriyaga 8 tadan mahsulot yaratish
        categories.forEach((cat, index) => {
            MENU_DATA[cat] = Array.from({length: 8}, (_, i) => {
                const id = (index + 1) * 100 + i;
                const tag = PHOTO_TAGS[cat];
                return {
                    id: id,
                    name: `${cat.slice(0, -3)} Special #${i + 1}`,
                    price: (cat === "PIZZALAR" ? 65000 : 25000) + (i * 1500),
                    // Har bir rasm uchun unikal 'sig' (signature) qo'shildi, rasmlar takrorlanmaydi
                    img: `https://source.unsplash.com/featured/400x300?${tag}&sig=${id}`,
                    comp: "Yangi mahsulotlardan tayyorlangan, o'ziga xos ta'mga ega maxsus retsept."
                };
            });
        });

        let cart = {};

        function initCategories() {
            const bar = document.getElementById('category-bar');
            bar.innerHTML = '';
            Object.keys(MENU_DATA).forEach((cat, index) => {
                const btn = document.createElement('button');
                btn.innerText = cat;
                btn.className = `cat-btn glass px-6 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-zinc-800 transition-all whitespace-nowrap`;
                btn.onclick = (e) => renderProducts(cat, e.target);
                bar.appendChild(btn);
                if(index === 0) renderProducts(cat, btn);
            });
        }

        function renderProducts(cat, btnElement) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active-btn'));
            if(btnElement) btnElement.classList.add('active-btn');
            const grid = document.getElementById('product-grid');
            grid.innerHTML = ''; 
            MENU_DATA[cat].forEach(p => {
                grid.innerHTML += `
                <div class="glass p-5 rounded-[2.5rem] flex flex-col gap-4 border border-white/5 product-card">
                    <div class="h-48 w-full overflow-hidden rounded-3xl">
                        <img src="${p.img}" alt="${p.name}">
                    </div>
                    <div>
                        <h3 class="text-sm font-black gold-text uppercase mb-1 leading-tight">${p.name}</h3>
                        <p class="font-bold text-lg">${p.price.toLocaleString()} <span class="text-[10px] font-normal uppercase">uzs</span></p>
                    </div>
                    <div class="bg-white/5 p-3 rounded-xl min-h-[60px]">
                        <p class="text-[11px] text-zinc-400 italic leading-snug">${p.comp}</p>
                    </div>
                    <button onclick="addToCart('${cat}', ${p.id})" class="w-full py-4 bg-white/5 hover:bg-yellow-600 hover:text-black border border-white/10 rounded-2xl text-[10px] font-black uppercase transition-all tracking-tighter">Savatga Qo'shish</button>
                </div>`;
            });
        }

        function addToCart(cat, id) {
            const item = MENU_DATA[cat].find(x => x.id === id);
            if(cart[id]) cart[id].qty++;
            else cart[id] = {...item, qty: 1};
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-list');
            list.innerHTML = '';
            let total = 0;
            const items = Object.values(cart);
            if(items.length === 0) list.innerHTML = '<p class="text-center py-10 uppercase text-[10px]">Savat bo\'sh</p>';
            items.forEach(i => {
                total += i.price * i.qty;
                list.innerHTML += `
                <div class="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/10">
                    <div>
                        <div class="text-[10px] font-black uppercase gold-text leading-tight">${i.name}</div>
                        <div class="text-[9px] text-zinc-500">${i.qty} x ${i.price.toLocaleString()}</div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="changeQty(${i.id}, -1)" class="w-7 h-7 bg-white/10 rounded-lg flex items-center justify-center">-</button>
                        <span class="text-xs font-bold w-4 text-center text-white">${i.qty}</span>
                        <button onclick="changeQty(${i.id}, 1)" class="w-7 h-7 bg-white/10 rounded-lg flex items-center justify-center">+</button>
                    </div>
                </div>`;
            });
            document.getElementById('total-price').innerText = total.toLocaleString() + " UZS";
        }

        function changeQty(id, delta) {
            if(cart[id]) {
                cart[id].qty += delta;
                if(cart[id].qty <= 0) delete cart[id];
                updateCartUI();
            }
        }

        function sendOrder() {
            const name = document.getElementById('custName').value;
            if(!name || Object.keys(cart).length === 0) return alert("Ism kiriting va mahsulot tanlang!");
            alert("Rahmat, " + name + "! Buyurtmangiz qabul qilindi.");
            cart = {}; updateCartUI();
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        window.onload = initCategories;
    </script>
</body>
</html>
